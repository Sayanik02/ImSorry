<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I'm Sorry</title>
    <style>
        :root { 
            --bg-void: #050508; 
            --gold: #b89947; /* Antique Royal Gold */
            --text-light: #dcdcdc; 
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-void); color: var(--text-light); 
            font-family: 'Times New Roman', serif; 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            overflow: hidden;
            position: relative;
        }

        /* Cosmic Dust Canvas */
        #dust-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        
        .container { 
            text-align: center; 
            max-width: 90%; 
            width: 450px; 
            padding: 40px 20px; 
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Royal Analog Wall Clock */
        .royal-clock {
            width: 120px; height: 120px;
            border: 3px solid var(--gold);
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle, #1a1a24 0%, var(--bg-void) 100%);
            box-shadow: 0 0 30px rgba(184, 153, 71, 0.15), inset 0 0 20px rgba(0,0,0,0.8);
            margin-bottom: 40px;
        }

        .roman-numeral {
            position: absolute;
            color: var(--gold);
            font-size: 14px;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .n12 { top: 6px; left: 50%; transform: translateX(-50%); }
        .n3 { right: 8px; top: 50%; transform: translateY(-50%); }
